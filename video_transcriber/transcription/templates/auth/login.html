{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="surface-card p-4 p-md-5">
    <h2 class="page-title text-center">Welcome Back</h2>
    <p class="page-subtitle text-center">Sign in to upload and manage your transcriptions.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-brand w-100">Login</button>
    </form>
    <p class="mt-3 text-center">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
    <p class="text-center"><a href="{% url 'password_reset' %}">Forgot Password?</a></p>
</div>
{% endblock %}
