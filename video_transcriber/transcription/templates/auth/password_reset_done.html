{% extends "base.html" %}
{% block title %}Password Reset Sent{% endblock %}

{% block content %}
<div class="card shadow p-4">
    <h2 class="text-center">Check Your Email</h2>
    <p class="text-center text-muted">
        If an account exists with the email you entered, we've sent a password reset link.
        Please check your inbox.
    </p>
    <div class="text-center mt-3">
        <a href="{% url 'login' %}" class="btn btn-primary">Back to Login</a>
    </div>
</div>
{% endblock %}
