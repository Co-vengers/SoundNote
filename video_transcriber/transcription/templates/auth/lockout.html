{% extends "base.html" %}
{% block title %}Account Locked{% endblock %}

{% block content %}
<div class="card shadow p-4 text-center">
    <h2 class="text-danger">Account Locked</h2>
    <p class="mt-3">Too many failed login attempts. Your account has been temporarily locked.</p>
    <p>Please try again after <strong>1 hour</strong>.</p>
    <a href="{% url 'login' %}" class="btn btn-primary mt-3">Back to Login</a>
</div>
{% endblock %}
