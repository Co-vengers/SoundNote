{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="surface-card p-4 p-md-5">
    <h2 class="page-title text-center">Create Account</h2>
    <p class="page-subtitle text-center">Set up your workspace to upload and transcribe videos.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-brand w-100">Register</button>
    </form>
    <p class="mt-3 text-center">Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
